name: Eval

# Run LLM-as-judge eval on PRs that touch prompts or eval code.
# Posts the score diff as a PR comment and fails if any dimension drops by 0.3.
#
# Required GitHub secret:
#   - ANTHROPIC_API_KEY

on:
  pull_request:
    paths:
      - "src/llm_eval/**"
      - "fixtures/**"
      - "examples/**/prompt_builder.py"
  workflow_dispatch:
    inputs:
      update_baseline:
        description: "Re-snapshot baseline scores from the current main"
        required: false
        default: "false"

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Run replay eval
        id: eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set +e
          python -m llm_eval.cli \
            --fixture fixtures/sample_pairs.json \
            --label "pr-${{ github.event.pull_request.number || 'manual' }}" \
            --baseline fixtures/baseline.json \
            --fail-threshold 0.3 \
            --out /tmp/eval-report.md \
            --json-out /tmp/eval-scores.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-${{ github.event.pull_request.number || 'manual' }}
          path: |
            /tmp/eval-report.md
            /tmp/eval-scores.json
          if-no-files-found: warn

      - name: Read report
        if: always()
        id: report
        run: |
          if [ -f /tmp/eval-report.md ]; then
            {
              echo 'body<<EOF'
              cat /tmp/eval-report.md
              echo
              echo "---"
              echo "🤖 _llm-eval workflow · exit=${{ steps.eval.outputs.exit_code }}_"
              echo EOF
            } >> "$GITHUB_OUTPUT"
          else
            echo "body=(no report)" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        env:
          REPORT_BODY: ${{ steps.report.outputs.body }}
        with:
          script: |
            const body = process.env.REPORT_BODY || '(empty)';
            const marker = '<!-- llm-eval-report -->';
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            const newBody = `${marker}\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: newBody,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: newBody,
              });
            }

      - name: Fail if regression
        if: steps.eval.outputs.exit_code != '0'
        run: exit 1
